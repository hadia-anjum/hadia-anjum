<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-labelledby="title desc">
  <title id="title">Animated snake contribution banner</title>
  <desc id="desc">A looping snake animation on a dark grid background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="snake" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1f2937" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="snakePath" d="M 80 160 H 240 V 120 H 400 V 80 H 560 V 120 H 720 V 160 H 880 V 120 H 1040 V 80" />
  </defs>

  <rect width="1200" height="220" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="220" rx="24" fill="url(#grid)"/>

  <circle cx="120" cy="52" r="32" fill="#7c3aed" opacity="0.15"/>
  <circle cx="1080" cy="170" r="40" fill="#22c55e" opacity="0.12"/>

  <g filter="url(#glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 80 160 H 240 V 120 H 400 V 80 H 560 V 120 H 720 V 160 H 880 V 120 H 1040 V 80" stroke="#0f766e" stroke-width="18" opacity="0.25"/>
    <path d="M 80 160 H 240 V 120 H 400 V 80 H 560 V 120 H 720 V 160 H 880 V 120 H 1040 V 80" stroke="url(#snake)" stroke-width="10" stroke-dasharray="18 14">
      <animate attributeName="stroke-dashoffset" from="0" to="-64" dur="4s" repeatCount="indefinite"/>
    </path>

    <circle r="10" fill="#dcfce7">
      <animateMotion dur="4s" repeatCount="indefinite" rotate="auto">
        <mpath href="#snakePath"/>
      </animateMotion>
    </circle>

    <circle r="22" fill="#22c55e" opacity="0.18">
      <animateMotion dur="4s" repeatCount="indefinite" rotate="auto">
        <mpath href="#snakePath"/>
      </animateMotion>
      <animate attributeName="r" values="20;24;20" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="600" y="48" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#cbd5e1">Contribution Snake</text>
  <text x="600" y="186" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#94a3b8">Committed SVG so it renders without waiting for GitHub Actions</text>
</svg>